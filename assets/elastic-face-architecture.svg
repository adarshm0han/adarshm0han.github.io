<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Elastic Face Recognition on AWS Architecture</title>
  <desc id="desc">Users send images to a web tier controller, which writes requests to an SQS request queue. An autoscaled EC2 application tier reads images from an input S3 bucket, writes results to DynamoDB, returns responses through an SQS response queue, and scales from zero to fifteen instances.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2f4ef"/>
    </marker>
    <style>
      .bg{fill:#070807}
      .panel{fill:#10140f;stroke:#2b3329;stroke-width:2}
      .orange{fill:#f7a21b}
      .green{fill:#1db954}
      .text{fill:#f2f4ef;font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:700}
      .small{fill:#a9afa6;font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:600}
      .line{stroke:#f2f4ef;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#9ae66e;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="520"/>
  <rect class="panel" x="28" y="28" width="1224" height="464" rx="14"/>

  <g transform="translate(72 182)">
    <circle cx="42" cy="36" r="22" fill="#f2f4ef"/>
    <path d="M8 104c0-34 68-34 68 0v28H8z" fill="#1db954" stroke="#f2f4ef" stroke-width="6"/>
    <path d="M4 50c-22 0-34 14-34 34v18h34M80 50c22 0 34 14 34 34v18H80" fill="none" stroke="#f2f4ef" stroke-width="6"/>
    <text class="text" x="42" y="178" text-anchor="middle">Users</text>
  </g>

  <g transform="translate(272 176)">
    <rect class="orange" x="0" y="0" width="108" height="112" rx="12"/>
    <rect x="0" y="68" width="108" height="44" fill="#e9edf0"/>
    <text x="54" y="98" text-anchor="middle" fill="#070807" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">Controller</text>
    <text class="text" x="54" y="148" text-anchor="middle">Web Tier</text>
  </g>

  <g transform="translate(520 144)">
    <rect class="orange" x="0" y="0" width="190" height="70" rx="0"/>
    <polygon points="16,35 38,20 38,50" fill="#f2f4ef"/>
    <polygon points="174,35 152,20 152,50" fill="#f2f4ef"/>
    <rect x="66" y="15" width="18" height="40" fill="#f2f4ef"/>
    <rect x="104" y="15" width="18" height="40" fill="#f2f4ef"/>
    <text class="text" x="95" y="-16" text-anchor="middle">Request Queue</text>
  </g>

  <g transform="translate(520 282)">
    <rect class="orange" x="0" y="0" width="190" height="70" rx="0"/>
    <polygon points="16,35 38,20 38,50" fill="#f2f4ef"/>
    <polygon points="174,35 152,20 152,50" fill="#f2f4ef"/>
    <rect x="66" y="15" width="18" height="40" fill="#f2f4ef"/>
    <rect x="104" y="15" width="18" height="40" fill="#f2f4ef"/>
    <text class="text" x="95" y="116" text-anchor="middle">Response Queue</text>
  </g>

  <g transform="translate(900 156)">
    <rect class="orange" x="0" y="0" width="74" height="64" rx="10"/>
    <rect class="orange" x="36" y="46" width="74" height="64" rx="10"/>
    <rect class="orange" x="72" y="92" width="74" height="64" rx="10"/>
    <text class="text" x="76" y="210" text-anchor="middle">Application Tier</text>
  </g>

  <g transform="translate(1130 128)">
    <path d="M0 18c0-14 70-14 70 0l-12 86c-4 14-46 14-52 0z" fill="none" stroke="#f7a21b" stroke-width="8"/>
    <ellipse cx="35" cy="18" rx="35" ry="13" fill="none" stroke="#f7a21b" stroke-width="8"/>
    <text class="text" x="35" y="-28" text-anchor="middle">Input bucket</text>
  </g>

  <g transform="translate(1122 322)">
    <rect x="0" y="0" width="88" height="58" fill="none" stroke="#f7a21b" stroke-width="6" rx="2"/>
    <path d="M0 18h88M0 36h88M22 0v58M44 0v58M66 0v58" stroke="#f7a21b" stroke-width="3"/>
    <text class="text" x="44" y="104" text-anchor="middle">Output DB</text>
  </g>

  <path class="line" d="M162 224H272"/>
  <text class="small" x="214" y="208" text-anchor="middle">Images</text>
  <path class="line" d="M272 266H162"/>
  <text class="small" x="214" y="296" text-anchor="middle">Results</text>

  <path class="line" d="M380 214H520"/>
  <text class="small" x="450" y="196" text-anchor="middle">Requests</text>
  <path class="line" d="M520 318H380"/>
  <text class="small" x="450" y="352" text-anchor="middle">Results</text>

  <path class="line" d="M710 179H900"/>
  <text class="small" x="806" y="160" text-anchor="middle">Requests</text>
  <path class="line" d="M900 318H710"/>
  <text class="small" x="806" y="350" text-anchor="middle">Results</text>

  <path class="line" d="M1130 196H1046"/>
  <text class="small" x="1088" y="178" text-anchor="middle">Images</text>
  <path class="line" d="M1046 354H1122"/>
  <text class="small" x="1088" y="336" text-anchor="middle">Results</text>

  <path class="dash" d="M326 330V430H974V312"/>
  <text class="small" x="650" y="460" text-anchor="middle">Custom autoscaling controller: 0 to 15 EC2 instances, then back to 0</text>

  <text class="text" x="640" y="86" text-anchor="middle">Images</text>
</svg>
